<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Kredi Kad - GED</title>
    <style>
        /* CSS: ESTIL KI SENP E PWÒP */
        body {
            background: #ddeefc;
            font-family: "Source Sans Pro", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .wrapper {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* KAT VIZYÈL KI SOTI NAN TANPLÈT LA */
        .card-item {
            width: 100%;
            height: 250px;
            border-radius: 15px;
            position: relative;
            z-index: 2;
            margin-bottom: -130px; /* Pou l chita sou fòm nan */
            transition: all 0.5s ease;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            overflow: hidden;
            color: #fff;
            padding: 25px;
            box-sizing: border-box;
        }

        .card-item__bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        .card-item__top { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-item__chip { width: 50px; }
        .card-item__type { height: 40px; }

        .card-item__number {
            font-size: 24px;
            margin: 30px 0;
            display: block;
            font-family: "Source Code Pro", monospace;
        }

        .card-item__info { display: flex; justify-content: space-between; }
        .card-item__label { font-size: 11px; opacity: 0.7; margin-bottom: 5px; display: block; }
        .card-item__name { font-size: 16px; font-weight: bold; text-transform: uppercase; }

        /* FÒM POU RANPLI A */
        .card-form {
            background: #fff;
            border-radius: 10px;
            padding: 150px 30px 30px;
            box-shadow: 0 30px 60px rgba(90, 116, 148, 0.4);
        }

        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; }
        
        .input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 5px;
            font-size: 15px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        /* VALIDASYON WOUJ/VÈT */
        input.valid { border-color: #28a745 !important; background-color: #f8fff9; }
        input.invalid { border-color: #dc3545 !important; background-color: #fff8f8; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: #2364d2;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="card-item">
        <img id="cardBg" src="" class="card-item__bg">
        <div class="card-item__top">
            <img src="https://raw.githubusercontent.com/muhammederdem/credit-card-form/master/src/assets/images/chip.png" class="card-item__chip">
            <img id="cardType" src="https://raw.githubusercontent.com/muhammederdem/credit-card-form/master/src/assets/images/visa.png" class="card-item__type">
        </div>
        <label class="card-item__number" id="cardNumDisplay">#### #### #### ####</label>
        <div class="card-item__info">
            <div class="card-item__holder">
                <span class="card-item__label">TITULAIRE</span>
                <div class="card-item__name" id="cardNameDisplay">ADBYAS ROBERT</div>
            </div>
            <div class="card-item__date">
                <span class="card-item__label">EXPIRE</span>
                <div class="card-item__name" id="cardDateDisplay">MM/YY</div>
            </div>
        </div>
    </div>

    <form class="card-form" id="cardForm">
        <div class="input-group">
            <label>Email de confirmation</label>
            <input type="email" id="email" placeholder="egzanp@gmail.com" required>
        </div>

        <div class="input-group">
            <label>Numéro de carte</label>
            <input type="text" id="cardNumber" maxlength="19" placeholder="#### #### #### ####" required>
        </div>

        <div class="input-group">
            <label>Nom sur la carte</label>
            <input type="text" id="cardName" placeholder="Nom complet" required>
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="input-group" style="flex: 1;">
                <label>Date d'expiration</label>
                <input type="text" id="cardDate" placeholder="MM/YY" maxlength="5" required>
            </div>
            <div class="input-group" style="flex: 1;">
                <label>CVV</label>
                <input type="password" id="cardCvv" maxlength="4" required>
            </div>
        </div>

        <button type="submit" class="btn-submit">PAYER MAINTENANT</button>
    </form>
</div>

<script>
    // --- 0. KONEKTE AK AKEY LA (Rale imèl ak montan) ---
    document.addEventListener('DOMContentLoaded', function() {
        const emailSere = localStorage.getItem('ged_email');
        const montanSere = localStorage.getItem('ged_amount');

        if (emailSere) {
            const elEmail = document.getElementById('email');
            if (elEmail) {
                elEmail.value = emailSere;
                // Sa a fòse lojik validasyon ou an (pwen #2 a) kouri pou l vin vèt
                elEmail.dispatchEvent(new Event('input'));
            }
        }

        if (montanSere) {
            const elBtn = document.querySelector('.btn-submit');
            if (elBtn) {
                elBtn.innerText = "PAYER $" + montanSere;
            }
        }
    });

    // 1. Chanje Background Random menm jan ak pwojè a
    const randomBg = Math.floor(Math.random() * 25) + 1;
    document.getElementById('cardBg').src = `https://raw.githubusercontent.com/muhammederdem/credit-card-form/master/src/assets/images/${randomBg}.jpeg`;

    // 2. Lojik Validasyon Email (Vèt si @ ak .com la) - MWEN PA TOUCHÈ L!
    const emailInput = document.getElementById('email');
    emailInput.addEventListener('input', function() {
        const regex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,3}$/;
        if (regex.test(this.value)) {
            this.classList.add('valid');
            this.classList.remove('invalid');
        } else {
            this.classList.add('invalid');
            this.classList.remove('valid');
        }
    });

    // 3. Lojik Nimewo Kad (Espas + Chanjman Logo) - MWEN PA TOUCHÈ L!
    const cardNumInput = document.getElementById('cardNumber');
    cardNumInput.addEventListener('input', function(e) {
        let v = e.target.value.replace(/\s+/g, '').replace(/[^0-9]/gi, '');
        let parts = [];
        for (let i = 0; i < v.length; i += 4) {
            parts.push(v.substring(i, i + 4));
        }
        e.target.value = parts.join(' ');
        document.getElementById('cardNumDisplay').innerText = e.target.value || "#### #### #### ####";

        // Chanje logo
        const typeImg = document.getElementById('cardType');
        if (v.startsWith('4')) typeImg.src = "https://raw.githubusercontent.com/muhammederdem/credit-card-form/master/src/assets/images/visa.png";
        else if (v.startsWith('5')) typeImg.src = "https://raw.githubusercontent.com/muhammederdem/credit-card-form/master/src/assets/images/mastercard.png";
    });

    // 4. Lojik Non ak Dat - MWEN PA TOUCHÈ L!
    document.getElementById('cardName').addEventListener('input', function() {
        document.getElementById('cardNameDisplay').innerText = this.value.toUpperCase() || "ADBYAS ROBERT";
    });

    document.getElementById('cardDate').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g, '');
        if (v.length >= 2) v = v.substring(0, 2) + '/' + v.substring(2, 4);
        e.target.value = v;
        document.getElementById('cardDateDisplay').innerText = v || "MM/YY";
    });
</script>

</body>
</html>
